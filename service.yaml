apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: biblioteca-demo
spec:
  template:
    spec:
      containers:
      - image: southamerica-east1-docker.pkg.dev/nexus-491112/biblioteca-php/app-biblioteca:v2
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "127.0.0.1" # IMPORTANTE: En Cloud Run se hablan por localhost
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: "root"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: biblioteca_php-MYSQL_ROOT_PASSWORD-test
              key: "latest"
        - name: DB_NAME
          value: "biblioteca_db"
      - image: mysql:8.0
        env:
        - name: MYSQL_USER
          value: "biblioteca_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: biblioteca_php-MYSQL_PASSWORD-test
              key: "latest"
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: biblioteca_php-MYSQL_ROOT_PASSWORD-test
              key: "latest"
        - name: MYSQL_DATABASE
          value: "biblioteca_db"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-data
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi 
